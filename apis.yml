aid: warpstream
name: WarpStream
description: >
  WarpStream is a diskless, Apache Kafka-compatible data streaming platform built directly
  on top of cloud object storage such as S3, GCP, and Azure. It eliminates the need for
  local disks, brokers to rebalance, and ZooKeeper, delivering Kafka compatibility through
  a single, stateless Go binary deployed as auto-scaling agents in customer VPCs. WarpStream
  offers a REST management API for programmatically controlling workspaces, virtual clusters,
  topics, ACLs, pipelines, agent pools, and BYOC deployments. The platform supports
  Exactly Once Semantics, transactions, a built-in Schema Registry, and Tableflow for
  streaming data into Iceberg tables, with pricing based purely on compute minutes and
  uncompressed data written and stored.
