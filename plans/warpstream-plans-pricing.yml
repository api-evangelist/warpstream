name: WarpStream Plans and Pricing
description: >
  WarpStream offers consumption-based pricing across four cluster tiers for BYOC deployments,
  with usage metered in 15-minute intervals only when agents are active. All accounts receive
  $400 in non-expiring free credits with no credit card required to start. There are no
  per-agent, per-core, or per-partition fees. Idle clusters are free due to scale-to-zero
  functionality.
specificationVersion: "0.1"
url: https://www.warpstream.com/pricing
plans:
  - name: Dev
    description: >
      Entry-level cluster tier for development and testing workloads. No uptime SLA.
      Suitable for getting started and non-production evaluation.
    url: https://www.warpstream.com/pricing
    price: 100.00
    priceCurrency: USD
    billingCycle: monthly
    features:
      - Kafka-compatible streaming
      - Up to 4,096 partitions
      - No SLA
      - Scale-to-zero (idle clusters free)
      - $400 free credits for new accounts
      - 15-minute billing intervals
    usagePricing:
      - metric: Cluster minutes (Dev)
        price: 0.0345
        priceCurrency: USD
        per: 15 minutes
      - metric: Uncompressed GiB written (first 50 TiB/month)
        price: 0.01
        priceCurrency: USD
        per: GiB
      - metric: Uncompressed GiB stored (first 50 TiB/month)
        price: 0.01
        priceCurrency: USD
        per: GiB

  - name: Fundamentals
    description: >
      Production-grade cluster tier with a 99.9% uptime SLA. Suitable for teams running
      workloads that require reliability guarantees and higher partition limits.
    url: https://www.warpstream.com/pricing
    price: 500.00
    priceCurrency: USD
    billingCycle: monthly
    features:
